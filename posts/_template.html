<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Post template" />
    <title>Post title | ankhseraph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <div class="title-block">
          <h1>Post title</h1>
          <p>One-line vibe check.</p>
        </div>
        <nav class="site-nav">
          <a class="btn" href="../index.html#logbook">Back to Logbook</a>
          <a class="btn" href="../index.html">Home</a>
        </nav>
      </header>

      <main>
        <section class="section">
          <div class="post-meta">
            <span class="post-date">YYYY-MM-DD</span>
            <span class="post-author">Admin: ankhseraph</span>
          </div>
          <h2>Context</h2>
          <p>
            What kicked this off? What problem was annoying enough to fix?
          </p>
        </section>

        <section class="section">
          <h2>Work</h2>
          <ul class="list">
            <li><span class="label">Step</span>Key action.</li>
            <li><span class="label">Step</span>Result.</li>
            <li><span class="label">Step</span>Next.</li>
          </ul>
        </section>

        <section class="section">
          <h2>Notes</h2>
          <p>Links, commands, scraps, receipts.</p>
        </section>
      </main>

      <footer class="site-footer">
        <span>Last updated: <span class="muted">YYYY-MM-DD</span></span>
      </footer>
    </div>
  </body>
</html>
